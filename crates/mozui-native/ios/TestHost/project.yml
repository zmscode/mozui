name: MozuiIOSHost

options:
  deploymentTarget:
    iOS: "17.0"

schemes:
  MozuiIOSHost:
    build:
      targets:
        MozuiIOSHost: all
    run:
      config: Debug
      enableGPUFrameCaptureMode: disabled
      enableGPUValidationMode: false

targets:
  MozuiIOSHost:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mozui.MozuiIOSHost
        PRODUCT_NAME: MozuiIOSHost
        INFOPLIST_FILE: Resources/Info.plist
        SWIFT_VERSION: "5.10"
        SWIFT_OBJC_BRIDGING_HEADER: Bridge/MozuiIosDemoFFI.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Bridge
        ARCHS[sdk=iphonesimulator*]: arm64
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/../../../../target/$(RUST_TARGET)/debug
        OTHER_LDFLAGS:
          - -lmozui_ios_demo
        RUST_TARGET[sdk=iphoneos*]: aarch64-apple-ios
        RUST_TARGET[sdk=iphonesimulator*]: aarch64-apple-ios-sim
    preBuildScripts:
      - name: Build Rust Demo
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          cd "$SRCROOT/../../../../"
          if ! rustup target list --installed | grep -q "^$RUST_TARGET$"; then
            echo "missing Rust target: $RUST_TARGET" >&2
            echo "install it with: rustup target add $RUST_TARGET" >&2
            exit 1
          fi
          cargo build -p mozui-ios-demo --target "$RUST_TARGET"
