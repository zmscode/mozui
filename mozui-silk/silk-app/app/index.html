<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			:root {
				--bg: #0c0c0e;
				--surface: #141418;
				--surface-hover: #1a1a20;
				--border: #222228;
				--border-focus: #9966ff;
				--text: #e8e8ec;
				--text-dim: #6e6e7a;
				--text-done: #44444e;
				--accent: #9966ff;
				--accent-dim: rgba(153, 102, 255, 0.12);
				--danger: #ff4466;
				--danger-dim: rgba(255, 68, 102, 0.1);
				--radius: 10px;
				--font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
				--mono: "SF Mono", Menlo, Consolas, monospace;
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: var(--font);
				background: var(--bg);
				color: var(--text);
				height: 100vh;
				display: flex;
				flex-direction: column;
				overflow: hidden;
				-webkit-font-smoothing: antialiased;
			}

			.header {
				padding: 28px 24px 0;
				flex-shrink: 0;
			}
			.header h1 {
				font-size: 26px;
				font-weight: 700;
				letter-spacing: -0.5px;
				color: #fff;
			}
			.header .subtitle {
				font-size: 13px;
				color: var(--text-dim);
				margin-top: 4px;
			}
			.stats {
				display: flex;
				gap: 16px;
				margin-top: 14px;
				font-size: 12px;
				font-family: var(--mono);
				color: var(--text-dim);
			}
			.stats .count {
				color: var(--accent);
				font-weight: 600;
			}

			.input-row {
				display: flex;
				gap: 8px;
				padding: 16px 24px;
				flex-shrink: 0;
			}
			.input-row input {
				flex: 1;
				padding: 11px 14px;
				border: 1px solid var(--border);
				border-radius: var(--radius);
				background: var(--surface);
				color: var(--text);
				font-size: 14px;
				font-family: var(--font);
				outline: none;
				transition: border-color 0.15s;
			}
			.input-row input:focus {
				border-color: var(--border-focus);
			}
			.input-row input::placeholder {
				color: var(--text-dim);
			}
			.input-row button {
				padding: 0 18px;
				border: none;
				border-radius: var(--radius);
				background: var(--accent);
				color: #fff;
				font-size: 14px;
				font-weight: 600;
				cursor: pointer;
				transition: opacity 0.15s;
				white-space: nowrap;
			}
			.input-row button:hover {
				opacity: 0.85;
			}
			.input-row button:active {
				opacity: 0.7;
			}

			.filter-bar {
				display: flex;
				gap: 4px;
				padding: 0 24px 12px;
				flex-shrink: 0;
			}
			.filter-btn {
				padding: 5px 12px;
				border: 1px solid transparent;
				border-radius: 6px;
				background: transparent;
				color: var(--text-dim);
				font-size: 12px;
				font-weight: 500;
				cursor: pointer;
				transition: all 0.15s;
			}
			.filter-btn:hover {
				color: var(--text);
				background: var(--surface);
			}
			.filter-btn.active {
				color: var(--accent);
				background: var(--accent-dim);
				border-color: rgba(153, 102, 255, 0.25);
			}

			.list {
				flex: 1;
				overflow-y: auto;
				padding: 0 24px 24px;
			}
			.list::-webkit-scrollbar {
				width: 6px;
			}
			.list::-webkit-scrollbar-track {
				background: transparent;
			}
			.list::-webkit-scrollbar-thumb {
				background: var(--border);
				border-radius: 3px;
			}

			.empty {
				text-align: center;
				padding: 48px 0;
				color: var(--text-dim);
				font-size: 14px;
			}
			.empty .icon {
				font-size: 32px;
				margin-bottom: 8px;
				opacity: 0.4;
			}

			.todo {
				display: flex;
				align-items: center;
				gap: 12px;
				padding: 12px 14px;
				border-radius: var(--radius);
				border: 1px solid var(--border);
				background: var(--surface);
				margin-bottom: 6px;
				transition:
					background 0.12s,
					border-color 0.12s;
				cursor: default;
			}
			.todo:hover {
				background: var(--surface-hover);
			}
			.todo.done {
				opacity: 0.55;
			}

			.check {
				width: 20px;
				height: 20px;
				border: 2px solid var(--border);
				border-radius: 6px;
				flex-shrink: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				transition: all 0.15s;
			}
			.check:hover {
				border-color: var(--accent);
			}
			.todo.done .check {
				background: var(--accent);
				border-color: var(--accent);
			}
			.check svg {
				display: none;
			}
			.todo.done .check svg {
				display: block;
			}

			.todo-text {
				flex: 1;
				font-size: 14px;
				line-height: 1.4;
				word-break: break-word;
			}
			.todo.done .todo-text {
				text-decoration: line-through;
				color: var(--text-done);
			}

			.todo-text input {
				width: 100%;
				padding: 2px 0;
				border: none;
				background: transparent;
				color: var(--text);
				font-size: 14px;
				font-family: var(--font);
				outline: none;
			}

			.delete-btn {
				width: 28px;
				height: 28px;
				border: none;
				border-radius: 6px;
				background: transparent;
				color: var(--text-dim);
				font-size: 16px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				opacity: 0;
				transition: all 0.12s;
				flex-shrink: 0;
			}
			.todo:hover .delete-btn {
				opacity: 1;
			}
			.delete-btn:hover {
				background: var(--danger-dim);
				color: var(--danger);
			}

			.clear-btn {
				display: block;
				margin: 8px auto 0;
				padding: 6px 14px;
				border: 1px solid var(--border);
				border-radius: 6px;
				background: transparent;
				color: var(--text-dim);
				font-size: 12px;
				cursor: pointer;
				transition: all 0.15s;
			}
			.clear-btn:hover {
				border-color: var(--danger);
				color: var(--danger);
				background: var(--danger-dim);
			}
		</style>
	</head>
	<body>
		<div class="header">
			<h1>Silk Todo</h1>
			<p class="subtitle">Zero Rust &mdash; powered by Silk runtime</p>
			<div class="stats">
				<span><span class="count" id="total">0</span> total</span>
				<span><span class="count" id="remaining">0</span> remaining</span>
				<span><span class="count" id="completed">0</span> done</span>
			</div>
		</div>

		<div class="input-row">
			<input id="input" type="text" placeholder="What needs to be done?" autocomplete="off" />
			<button id="add-btn">Add</button>
		</div>

		<div class="filter-bar">
			<button class="filter-btn active" data-filter="all">All</button>
			<button class="filter-btn" data-filter="active">Active</button>
			<button class="filter-btn" data-filter="done">Done</button>
		</div>

		<div class="list" id="list"></div>

		<script src="renderer.js"></script>
	</body>
</html>
